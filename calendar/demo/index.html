<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التقويم الهجري (أم القرى) — توثيق شامل | CoreComponents</title>
  <meta name="description" content="توثيق وأمثلة تفاعلية كاملة لمكتبة التقويم الهجري — أم القرى — Vanilla JS / TypeScript">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- Core styles -->
  <link rel="stylesheet" href="../../theme/src/core-theme.css">
  <link rel="stylesheet" href="../../theme/assets/icons/bootstrap-icons.css">
  <link rel="stylesheet" href="../src/hijri-calendar.css">

  <!-- Documentation theme -->
  <link rel="stylesheet" href="./docs-theme.css">

  <!-- Filter button active style -->
  <style>
    .test-btn.active {
      background: var(--accent-bg);
      border-color: var(--accent-bdr);
      color: var(--accent);
      font-weight: 700;
    }
    .hidden { display: none !important; }
    .tab-content { display: block; }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px var(--accent-glow);
    }
  </style>
</head>
<body>

  <!-- ── Theme flash prevention ── -->
  <script>
    (function () {
      var t = localStorage.getItem('cc-theme');
      var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) {
        document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <!-- ── App shell ── -->
  <div id="app">

    <!-- Sticky header -->
    <header id="doc-header"></header>

    <div class="doc-layout">

      <!-- Sidebar navigation -->
      <aside id="doc-sidebar"></aside>

      <!-- Main documentation content -->
      <main id="doc-main">
        <div class="doc-content">

          <!-- Vanilla sections -->
          <div id="s-hero"></div>
          <div id="s-getting-started"></div>
          <div id="s-today"></div>
          <div id="s-conversion"></div>
          <div id="s-string-conv"></div>
          <div id="s-validation"></div>
          <div id="s-month-info"></div>
          <div id="s-day-of-week"></div>
          <div id="s-leap-year"></div>
          <div id="s-julian"></div>
          <div id="s-constants"></div>
          <div id="s-widget"></div>
          <div id="s-event-handling"></div>
          <div id="s-api-ref"></div>

          <!-- Footer -->
          <footer class="doc-footer" style="margin-top:2rem;">
            <span>© 2026 CoreComponents · أم القرى · Vanilla JS</span>
            <a href="../../../index.html">← الصفحة الرئيسية</a>
          </footer>
        </div>
      </main>

    </div>
  </div>

  <!-- ── Bootstrap ── -->
  <script type="module" src="./demo-app.ts"></script>

</body>
</html>
